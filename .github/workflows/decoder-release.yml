name: Build and release MPCVideoDec-fork.ax

# Standalone-decoder distribution for this fork's own MPCVideoDec fixes/
# improvements, developed independently of upstream (Aleksoid1978/MPC-BE) -
# see https://github.com/Aleksoid1978/MPC-BE/pull/1165 for why the first one
# of these didn't get merged upstream. Builds only the MPCVideoDec filter
# (x64), not the rest of MPC-BE.

on:
  push:
    # No hyphens: update_revision.cmd splits `git describe --long` on "-" and
    # assumes the tag itself contributes exactly one token, so a hyphenated
    # tag (e.g. decoder-v...) shifts the count/hash fields and breaks REV_NUM.
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Prepare MSYS
        run: |
          curl -sSL https://github.com/Aleksoid1978/MSYS/raw/main/MSYS_MinGW-w64_GCC_1521_x86-x64.7z -o MSYS.7z
          7z x MSYS.7z -oC:\\MSYS
          echo '@ECHO OFF' > environments.bat
          echo 'SET "MPCBE_MSYS=C:\\MSYS"' >> environments.bat
          echo 'SET "MPCBE_MINGW=C:\\MSYS\\mingw"' >> environments.bat
          .\\update_gcc.bat
        shell: pwsh

      - name: Build MPCVideoDec-fork (x64 Release)
        run: |
          .\\build.bat Build x64 Filters Release NoWait
        shell: pwsh

      - name: Stage release files
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          New-Item -ItemType Directory -Force -Path dist\package | Out-Null
          Copy-Item _bin\Filters_x64\MPCVideoDec-fork.ax dist\package\
          Copy-Item scripts\Install_MPCVideoDec-fork_64.cmd dist\package\
          Copy-Item scripts\Uninstall_MPCVideoDec-fork_64.cmd dist\package\
          Compress-Archive -Path dist\package\* -DestinationPath dist\MPCVideoDec-fork-x64.zip -Force
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: MPCVideoDec-fork-x64
          path: dist\MPCVideoDec-fork-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist\MPCVideoDec-fork-x64.zip
          generate_release_notes: true
